<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Home - Belajar App</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { background-color: #f4f6f9; } </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Belajar Company</a>
        <div class="d-flex align-items-center">
            <span class="text-white me-3">Welcome, <strong sec:authentication="principal.username"></strong>!</span>
            <form th:action="@{/logout}" method="POST" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100 border-0 border-top border-primary border-3">
                <div class="card-body">
                    <h5 class="card-title fw-bold">User Information</h5>
                    <hr>
                    <ul class="list-unstyled mb-0">
                        <li class="mb-2"><strong>Role(s):</strong> <span class="badge bg-secondary" sec:authentication="principal.authorities"></span></li>
                        <div th:if="${session.user}">
                            <li class="mb-2"><strong>Name:</strong> <span th:text="${session.user.firstName} + ' ' + ${session.user.lastName}"></span></li>
                            <li><strong>Email:</strong> <span th:text="${session.user.email}"></span></li>
                        </div>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100 border-0 border-top border-success border-3">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Special Portals</h5>
                    <hr>
                    <div class="list-group list-group-flush">
                        <div sec:authorize="hasRole('MANAGER')">
                            <a th:href="@{/leaders}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                Leadership Meeting <span class="badge bg-warning text-dark rounded-pill">Manager</span>
                            </a>
                        </div>
                        <div sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/systems}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                IT Systems Meeting <span class="badge bg-danger rounded-pill">Admin</span>
                            </a>
                        </div>
                        <div sec:authorize="!hasRole('MANAGER') and !hasRole('ADMIN')">
                            <p class="text-muted mb-0">No special access portals available for your current role.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
