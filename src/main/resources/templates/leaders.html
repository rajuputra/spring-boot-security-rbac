<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Management Portal - Belajar App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 border-top border-warning border-5">
                <div class="card-body p-5">
                    <div class="d-flex align-items-center mb-4">
                        <span class="display-4 me-3">👔</span>
                        <div>
                            <h2 class="fw-bold mb-0 text-dark">Management Executive Portal</h2>
                            <p class="text-muted mb-0 small text-uppercase fw-bold">Restricted Access: Managers Only</p>
                        </div>
                    </div>

                    <div class="p-4 bg-white border rounded mb-4">
                        <h5 class="fw-bold text-primary mb-3">Annual Leadership Retreat 2026</h5>
                        <p class="lead">See you in <strong>Brazil</strong> for our annual Leadership retreat!</p>
                        <div class="alert alert-warning mb-0 border-0 shadow-sm">
                            <strong>Note:</strong> Keep this trip a secret, don't tell the regular employees LOL :-)
                        </div>
                    </div>

                    <hr class="my-4">

                    <a th:href="@{/}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
