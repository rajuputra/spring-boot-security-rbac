<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IT System Admin - Belajar App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 border-top border-danger border-5 text-dark">
                <div class="card-body p-5">
                    <div class="d-flex align-items-center mb-4">
                        <span class="display-4 me-3">⚙️</span>
                        <div>
                            <h2 class="fw-bold mb-0">IT Systems Management</h2>
                            <p class="text-muted mb-0 small text-uppercase fw-bold text-danger">Highest Clearance Required</p>
                        </div>
                    </div>

                    <div class="p-4 bg-dark text-white rounded mb-4 shadow">
                        <h5 class="fw-bold text-danger mb-3">System Admin Rewards</h5>
                        <p class="lead">We have the annual holiday <strong>Caribbean cruise</strong> coming up. Register now!</p>
                        <p class="text-muted small italic">Keep this trip a secret, don't tell the regular employees LOL :-) Or else!</p>
                    </div>

                    <div class="card border-0 bg-info bg-opacity-10 mb-4 text-dark">
                        <div class="card-body">
                            <h6 class="fw-bold">System Status: <span class="badge bg-success ms-2">All Clear</span></h6>
                        </div>
                    </div>

                    <hr class="my-4">

                    <a th:href="@{/}" class="btn btn-dark px-4">
                        <i class="bi bi-house-door"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
