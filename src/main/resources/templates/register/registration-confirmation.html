<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Registration Confirmed - Belajar App</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body { background-color: #f8f9fa; }
        .success-icon { font-size: 4rem; color: #198754; }
	</style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
	<div class="card shadow border-0 text-center" style="width: 100%; max-width: 550px;">
		<div class="card-body p-5">
			<div class="success-icon mb-3">
				<i class="bi bi-check-circle-fill">✓</i>
			</div>
			<h2 class="fw-bold text-success mb-2">Registration Successful!</h2>
			<p class="text-muted mb-4">Akun Anda telah berhasil dibuat. Berikut adalah detail data Anda:</p>

			<div class="table-responsive mb-4">
				<table class="table table-sm table-borderless text-start">
					<tbody>
					<tr>
						<th class="text-muted">Username</th>
						<td class="fw-bold" th:text="${webUser.userName}"></td>
					</tr>
					<tr>
						<th class="text-muted">Full Name</th>
						<td th:text="${webUser.firstName} + ' ' + ${webUser.lastName}"></td>
					</tr>
					<tr>
						<th class="text-muted">Email</th>
						<td th:text="${webUser.email}"></td>
					</tr>
					</tbody>
				</table>
			</div>

			<hr class="my-4">

			<a th:href="@{/showMyLoginPage}" class="btn btn-primary btn-lg px-5">Login Now</a>
		</div>
	</div>
</div>

</body>
</html>
