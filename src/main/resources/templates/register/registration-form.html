<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Belajar App</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm border-0" style="width: 100%; max-width: 500px; margin: 2rem 0;">
        <div class="card-body p-5">
            <h3 class="card-title text-center mb-4 fw-bold text-primary">Create Account</h3>

            <div th:if="${param.registrationError}" class="alert alert-danger p-2 text-center">
                <span th:text="${param.registrationError}"></span>
            </div>

            <form th:action="@{/register/processRegistrationForm}" th:object="${webUser}" method="POST">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{userName}" class="form-control" placeholder="Choose a username" />
                    <div th:if="${#fields.hasErrors('userName')}" class="text-danger small mt-1">
                        <span th:each="err : ${#fields.errors('userName')}" th:text="${err}"></span>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Create a password" />
                    <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1">
                        <span th:each="err : ${#fields.errors('password')}" th:text="${err}"></span>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" placeholder="First name" />
                        <div th:if="${#fields.hasErrors('firstName')}" class="text-danger small mt-1">
                            <span th:each="err : ${#fields.errors('firstName')}" th:text="${err}"></span>
                        </div>
                    </div>
                    <div class="col">
                        <label class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" placeholder="Last name" />
                        <div th:if="${#fields.hasErrors('lastName')}" class="text-danger small mt-1">
                            <span th:each="err : ${#fields.errors('lastName')}" th:text="${err}"></span>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="name@example.com" />
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1">
                        <span th:each="err : ${#fields.errors('email')}" th:text="${err}"></span>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Register</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/showMyLoginPage}" class="text-decoration-none">Already have an account? Login here</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
