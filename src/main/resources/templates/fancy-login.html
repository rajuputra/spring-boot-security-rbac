<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Belajar App</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm border-0" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5">
            <h3 class="card-title text-center mb-4 fw-bold text-primary">Sign In</h3>

            <div th:if="${param.error}" class="alert alert-danger p-2 text-center" role="alert">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success p-2 text-center" role="alert">
                You have been logged out.
            </div>

            <form th:action="@{/authenticateTheUser}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                </div>
            </form>

            <hr class="my-4">
            <div class="text-center">
                <p class="mb-0">Don't have an account?</p>
                <a th:href="@{/register/showRegistrationForm}" class="text-decoration-none fw-bold">Register New User</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
