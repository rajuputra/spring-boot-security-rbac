<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Welcome - Belajar App</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Membuat background gradient yang halus */
    .hero-bg {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
  </style>
</head>
<body class="hero-bg d-flex flex-column min-vh-100">

<div class="container flex-grow-1 d-flex justify-content-center align-items-center">
  <div class="text-center p-5 bg-white shadow-lg rounded-4" style="max-width: 700px; width: 100%;">

    <div class="mb-4">
      <span style="font-size: 5rem;">🚀</span>
    </div>

    <h1 class="display-5 fw-bold text-dark mb-3">Belajar Landing Page</h1>

    <p class="lead text-secondary mb-5 px-3">
      Welcome to the landing page! This page is open to the public... no login required :-) <br>
      Silakan klik tombol di bawah untuk masuk ke area sistem.
    </p>

    <a th:href="@{/employees}" class="btn btn-primary btn-lg px-5 py-3 shadow-sm rounded-pill fw-bold">
      Access Secure Site
    </a>

  </div>
</div>

<footer class="py-4 text-center text-muted mt-auto">
  <small class="fw-semibold">🛡️ Spring Security – Public Landing Page</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
